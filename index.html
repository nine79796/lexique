<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lexique</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lexique">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f0f0d;
  --surface: #1a1a17;
  --surface2: #222220;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede6;
  --text-muted: #888880;
  --text-dim: #555550;
  --accent: #c8a96e;
  --accent-dim: rgba(200,169,110,0.15);
  --accent-glow: rgba(200,169,110,0.08);
  --danger: #c86e6e;
  --danger-dim: rgba(200,110,110,0.12);
  --anki: #6eb4c8;
  --anki-dim: rgba(110,180,200,0.15);
  --anki-glow: rgba(110,180,200,0.08);
  --valid: #6ec87a;
  --valid-dim: rgba(110,200,122,0.15);
  --invalid: #c86e6e;
  --invalid-dim: rgba(200,110,110,0.15);
  --radius: 10px;
  --radius-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 15px; line-height: 1.6; }
.app { max-width: 720px; margin: 0 auto; padding: 0 1.25rem 4rem; }

.header { padding: 1.75rem 0 0; display: flex; align-items: flex-start; justify-content: space-between; }
.header-text h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700; letter-spacing: -0.02em; }
.header-text h1 span { color: var(--accent); }
.header-text p { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.offline-badge { font-size: 10px; padding: 3px 9px; border-radius: 20px; background: rgba(200,110,110,0.15); color: var(--danger); border: 0.5px solid rgba(200,110,110,0.25); display: none; white-space: nowrap; margin-top: 6px; }
.offline-badge.show { display: inline-flex; align-items: center; gap: 4px; }

.tabs { display: flex; gap: 2px; margin: 1.5rem 0 1.75rem; border-bottom: 0.5px solid var(--border); }
.tab { padding: 10px 18px; background: none; border: none; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; position: relative; transition: color 0.15s; white-space: nowrap; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); }
.tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1.5px; background: var(--accent); border-radius: 2px; }
.tab-content { display: none; }
.tab-content.active { display: block; }

.stats-row { display: flex; gap: 1.5rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-val { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 500; color: var(--accent); line-height: 1; }
.stat-val.anki-val { color: var(--anki); }
.stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }

.search-wrap { position: relative; margin-bottom: 1rem; }
.search-wrap input { width: 100%; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 14px 10px 36px; outline: none; transition: border-color 0.15s; }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text-dim); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px; pointer-events: none; }

.add-section { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; }
.add-row { display: flex; gap: 8px; flex-wrap: wrap; }
.add-row input, .add-row select { background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 14px; outline: none; transition: border-color 0.15s; }
.add-row input { flex: 1; min-width: 140px; }
.add-row input::placeholder { color: var(--text-dim); }
.add-row input:focus, .add-row select:focus { border-color: var(--accent); }
.add-row select { min-width: 130px; cursor: pointer; }
.add-row select option { background: #1a1a17; }

/* Validation spinner / badge */
.validation-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; min-height: 22px; }
.val-badge { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.04em; display: inline-flex; align-items: center; gap: 4px; }
.val-badge.valid   { background: var(--valid-dim);   color: var(--valid);   border: 0.5px solid rgba(110,200,122,0.3); }
.val-badge.invalid { background: var(--invalid-dim); color: var(--invalid); border: 0.5px solid rgba(200,110,110,0.3); }
.val-badge.pending { background: var(--surface2); color: var(--text-dim); border: 0.5px solid var(--border2); }
.val-spinner { width: 8px; height: 8px; border: 1.5px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

.btn { padding: 10px 18px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--accent-dim); color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s, transform 0.1s; white-space: nowrap; }
.btn:hover { background: rgba(200,169,110,0.25); }
.btn:active { transform: scale(0.97); }
.btn-sm { padding: 7px 12px; font-size: 12px; }
.btn-danger { background: var(--danger-dim); color: var(--danger); border-color: rgba(200,110,110,0.2); padding: 6px 10px; font-size: 12px; }
.btn-danger:hover { background: rgba(200,110,110,0.22); }

.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.filter-btn { padding: 5px 13px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text-muted); font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.filter-btn.anki-filter { border-color: rgba(110,180,200,0.2); color: var(--text-dim); }
.filter-btn.anki-filter:hover { border-color: var(--anki); color: var(--anki); }
.filter-btn.anki-filter.active { background: var(--anki-dim); border-color: var(--anki); color: var(--anki); }

.sort-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
.sort-label { font-size: 12px; color: var(--text-dim); }
.sort-select { background: transparent; border: 0.5px solid var(--border); border-radius: var(--radius); color: var(--text-muted); font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 4px 10px; cursor: pointer; outline: none; }
.sort-select option { background: #1a1a17; }

.word-list { display: flex; flex-direction: column; gap: 8px; }
.word-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.2s, background 0.2s; animation: fadeIn 0.18s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.word-card:hover { border-color: var(--border2); }

.word-card.anki-ready { border-color: rgba(110,180,200,0.35); background: rgba(110,180,200,0.04); }
.word-card.anki-ready:hover { border-color: rgba(110,180,200,0.55); }
.word-card.anki-ready .word-btn { color: var(--anki); }
.word-card.anki-ready .word-btn:hover { color: #9dd4e8; }
.word-card.anki-ready .count-badge { background: var(--anki-dim); color: var(--anki); }
.word-card.anki-ready .date-tag:first-child { color: var(--anki); border-color: rgba(110,180,200,0.25); background: var(--anki-glow); }

.anki-badge { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 20px; background: var(--anki-dim); color: var(--anki); border: 0.5px solid rgba(110,180,200,0.3); text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; animation: ankiPulse 2.5s ease infinite; }
@keyframes ankiPulse { 0%,100%{opacity:1;} 50%{opacity:0.55;} }

.word-card.anki-done { opacity: 0.4; }
.word-card.anki-done .word-btn { text-decoration: line-through; color: var(--text-muted); }

.anki-check-btn { font-size: 11px; font-weight: 500; padding: 5px 10px; border-radius: var(--radius); border: 0.5px solid rgba(110,180,200,0.3); background: var(--anki-dim); color: var(--anki); cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background 0.15s; }
.anki-check-btn:hover { background: rgba(110,180,200,0.28); }

/* Word validity badge on card */
.word-valid-badge { font-size: 9px; font-weight: 500; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; letter-spacing: 0.03em; }
.word-valid-badge.valid   { background: var(--valid-dim);   color: var(--valid);   border: 0.5px solid rgba(110,200,122,0.3); }
.word-valid-badge.invalid { background: var(--invalid-dim); color: var(--invalid); border: 0.5px solid rgba(200,110,110,0.3); }
.word-valid-badge.pending { background: var(--surface2); color: var(--text-dim); border: 0.5px solid var(--border2); animation: ankiPulse 1.8s ease infinite; }

.word-card-top { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
.word-btn { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 500; color: var(--text); background: none; border: none; cursor: pointer; padding: 0; text-align: left; flex: 1; transition: color 0.15s; }
.word-btn:hover { color: var(--accent); }
.cat-badge { font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; }
.count-badge { font-size: 11px; font-weight: 500; color: var(--accent); background: var(--accent-dim); padding: 3px 10px; border-radius: 20px; flex-shrink: 0; min-width: 38px; text-align: center; }
.word-dates { padding: 0 14px 12px; display: flex; flex-wrap: wrap; gap: 5px; }
.date-tag { font-size: 11px; color: var(--text-muted); background: var(--surface2); border: 0.5px solid var(--border); border-radius: 5px; padding: 3px 9px; }
.date-tag:first-child { color: var(--accent); border-color: rgba(200,169,110,0.25); background: var(--accent-glow); }

.section-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; }
.toggle-btn { background: none; border: none; color: var(--text-muted); font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 0; }
.toggle-btn:hover { color: var(--accent); }
.toggle-icon { transition: transform 0.2s; display: inline-block; }
.toggle-icon.open { transform: rotate(90deg); }
.collapsible { display: none; margin-top: 10px; }
.collapsible.open { display: block; }
.cat-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.cat-chip { display: flex; align-items: center; gap: 6px; padding: 5px 10px 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 0.5px solid transparent; }
.cat-chip-del { background: none; border: none; cursor: pointer; color: inherit; opacity: 0.5; font-size: 14px; line-height: 1; padding: 0; transition: opacity 0.15s; }
.cat-chip-del:hover { opacity: 1; }
.cat-row { display: flex; gap: 8px; }
.cat-input { flex: 1; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 12px; outline: none; }
.cat-input:focus { border-color: var(--accent); }
.cat-input::placeholder { color: var(--text-dim); }

.empty { text-align: center; padding: 3rem 1rem; color: var(--text-dim); font-size: 13px; }
.empty-icon { font-family: 'Playfair Display', serif; font-size: 2rem; display: block; margin-bottom: 0.5rem; opacity: 0.25; }

.chart-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; }
.chart-card h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 1rem; }
.chart-wrap { position: relative; height: 220px; }
.top-words { display: flex; flex-direction: column; gap: 8px; }
.top-word-row { display: flex; align-items: center; gap: 10px; }
.top-word-label { font-family: 'Playfair Display', serif; font-size: 0.95rem; min-width: 120px; color: var(--text); }
.top-word-label.is-anki { color: var(--anki); }
.top-word-bar-wrap { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.top-word-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
.top-word-bar.is-anki { background: var(--anki); }
.top-word-count { font-size: 12px; color: var(--text-muted); min-width: 28px; text-align: right; }

/* PWA install prompt */
.install-banner { display: none; position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 12px 16px; gap: 12px; align-items: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 100; width: calc(100% - 2.5rem); max-width: 480px; animation: slideUp 0.3s ease; }
.install-banner.show { display: flex; }
@keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
.install-banner p { flex: 1; font-size: 13px; color: var(--text-muted); }
.install-banner p strong { color: var(--text); display: block; font-size: 14px; }
.install-banner-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; padding: 0 4px; }

@media (max-width: 480px) {
  .tabs { overflow-x: auto; }
  .tab { padding: 10px 12px; font-size: 12px; }
  .stats-row { gap: 1rem; }
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-text">
      <h1>Le<span>xique</span></h1>
      <p>Suivi de vocabulaire — récurrence &amp; Anki</p>
    </div>
    <span class="offline-badge" id="offlineBadge">⚡ Hors ligne</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('mots')">Mots</button>
    <button class="tab" onclick="switchTab('stats')">Statistiques</button>
  </div>

  <!-- TAB MOTS -->
  <div class="tab-content active" id="tab-mots">
    <div class="stats-row">
      <div class="stat"><span class="stat-val" id="statWords">0</span><span class="stat-label">Mots</span></div>
      <div class="stat"><span class="stat-val" id="statOcc">0</span><span class="stat-label">Occurrences</span></div>
      <div class="stat"><span class="stat-val" id="statCats">0</span><span class="stat-label">Catégories</span></div>
      <div class="stat"><span class="stat-val anki-val" id="statAnki">0</span><span class="stat-label">À mettre sur Anki</span></div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Rechercher un mot..." oninput="render()" />
    </div>

    <div class="section-card">
      <button class="toggle-btn" onclick="toggleSection('catBody','catIcon')">
        <span class="toggle-icon" id="catIcon">▶</span>
        Gérer les catégories
      </button>
      <div class="collapsible" id="catBody">
        <div class="cat-list" id="catChipList"></div>
        <div class="cat-row">
          <input class="cat-input" type="text" id="catInput" placeholder="Nouvelle catégorie..." />
          <button class="btn btn-sm" onclick="addCategory()">Ajouter</button>
        </div>
      </div>
    </div>

    <div class="add-section">
      <div class="add-row">
        <input type="text" id="wordInput" placeholder="Nouveau mot..." oninput="onWordInputChange()" />
        <select id="catSelect"></select>
        <button class="btn" onclick="addWord()">Ajouter</button>
      </div>
      <!-- Real-time validation strip -->
      <div class="validation-strip" id="validationStrip"></div>
    </div>

    <div class="filters" id="filterRow"></div>

    <div class="sort-row">
      <span class="sort-label">Trier par</span>
      <select class="sort-select" id="sortSelect" onchange="render()">
        <option value="freq">Fréquence</option>
        <option value="alpha">Alphabétique</option>
        <option value="recent">Plus récent</option>
        <option value="oldest">Plus ancien</option>
      </select>
    </div>

    <div class="word-list" id="wordList"></div>
  </div>

  <!-- TAB STATS -->
  <div class="tab-content" id="tab-stats">
    <div class="chart-card">
      <h3>Occurrences par jour (30 derniers jours)</h3>
      <div class="chart-wrap"><canvas id="chartTimeline"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Répartition par catégorie</h3>
      <div class="chart-wrap" style="height:200px"><canvas id="chartCats"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Top 10 mots les plus fréquents</h3>
      <div class="top-words" id="topWords"></div>
    </div>
  </div>

</div>

<!-- PWA install banner -->
<div class="install-banner" id="installBanner">
  <p><strong>Installer Lexique</strong>Accès rapide depuis l'écran d'accueil.</p>
  <button class="btn btn-sm" id="installBtn">Installer</button>
  <button class="install-banner-close" onclick="dismissInstall()">×</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════

const PALETTE = [
  {bg:'rgba(200,169,110,0.14)',color:'#c8a96e',border:'rgba(200,169,110,0.25)'},
  {bg:'rgba(110,180,200,0.14)',color:'#6eb4c8',border:'rgba(110,180,200,0.25)'},
  {bg:'rgba(140,200,110,0.14)',color:'#8cc86e',border:'rgba(140,200,110,0.25)'},
  {bg:'rgba(180,110,200,0.14)',color:'#b46ec8',border:'rgba(180,110,200,0.25)'},
  {bg:'rgba(200,110,130,0.14)',color:'#c86e82',border:'rgba(200,110,130,0.25)'},
  {bg:'rgba(100,160,220,0.14)',color:'#64a0dc',border:'rgba(100,160,220,0.25)'},
];
const ANKI_THRESHOLD = 3;

// ── Wordnik API ─────────────────────────────────────────────────
// Inscription gratuite : https://www.wordnik.com/signup
// Clé disponible dans : https://www.wordnik.com/users/YOUR_USERNAME/api_key
const WORDNIK_API_KEY = 'VOTRE_CLE_WORDNIK'; // ex: 'a2a73e7b926c924fad7001ca3111acd55af2ffabf50eb4ae5'

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════

let state = {words:{}, categories:{}};
let activeFilter = 'all';
let chartTimeline = null, chartCats = null;
let deferredInstallPrompt = null;

// Debounce timer for validation
let validationTimer = null;
// Cache de validation pour éviter les appels répétés
const validationCache = {};

// ═══════════════════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════════════════

function load() {
  try {
    const raw = localStorage.getItem('lexique_v4');
    if (raw) state = JSON.parse(raw);
    if (!state.words) state.words = {};
    if (!state.categories) state.categories = {};
  } catch(e) { state = {words:{}, categories:{}}; }
}
function save() { try { localStorage.setItem('lexique_v4', JSON.stringify(state)); } catch(e) {} }

// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════

function ts() { return Date.now(); }
function fmtFull(t) {
  const d = new Date(t);
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function fmtShort(t) {
  const d = new Date(t);
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}
function fmtDay(t) {
  const d = new Date(t);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function slug(s) { return s.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,''); }
function getCatColor(key) {
  const cat = state.categories[key];
  return cat ? PALETTE[cat.colorIdx % PALETTE.length] : null;
}
function isAnkiReady(w) { return w.occurrences.length >= ANKI_THRESHOLD && !w.ankiDone; }

// ═══════════════════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════════════════

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['mots','stats'][i]===name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='stats') renderCharts();
}
function toggleSection(bodyId, iconId) {
  document.getElementById(bodyId).classList.toggle('open');
  document.getElementById(iconId).classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════════
//  CATEGORIES
// ═══════════════════════════════════════════════════════════════

function addCategory() {
  const inp = document.getElementById('catInput');
  const label = inp.value.trim();
  if (!label) return;
  const key = slug(label)||'cat'+ts();
  if (!state.categories[key]) state.categories[key] = {label, colorIdx: Object.keys(state.categories).length};
  inp.value = '';
  save(); renderCatManager(); renderCatSelect(); renderFilters(); updateStats();
}
function deleteCategory(key) {
  delete state.categories[key];
  Object.values(state.words).forEach(w => { if (w.catKey===key) w.catKey=null; });
  if (activeFilter===key) activeFilter='all';
  save(); renderCatManager(); renderCatSelect(); renderFilters(); render();
}
function renderCatManager() {
  const list = document.getElementById('catChipList');
  const keys = Object.keys(state.categories);
  if (!keys.length) { list.innerHTML='<span style="font-size:12px;color:var(--text-dim)">Aucune catégorie.</span>'; return; }
  list.innerHTML = keys.map(key => {
    const c=state.categories[key], col=getCatColor(key);
    return `<div class="cat-chip" style="background:${col.bg};color:${col.color};border-color:${col.border}">
      ${c.label}<button class="cat-chip-del" onclick="deleteCategory('${key}')">×</button></div>`;
  }).join('');
}
function renderCatSelect() {
  document.getElementById('catSelect').innerHTML = '<option value="">— catégorie —</option>' +
    Object.keys(state.categories).map(k=>`<option value="${k}">${state.categories[k].label}</option>`).join('');
}

// ═══════════════════════════════════════════════════════════════
//  FILTERS
// ═══════════════════════════════════════════════════════════════

function renderFilters() {
  const row = document.getElementById('filterRow');
  let html = `<button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">Tous</button>`;
  Object.keys(state.categories).forEach(key => {
    const c=state.categories[key], col=getCatColor(key), isA=activeFilter===key;
    html += `<button class="filter-btn ${isA?'active':''}" onclick="setFilter('${key}')"
      style="${isA?`background:${col.bg};border-color:${col.color};color:${col.color}`:''}">
      ${c.label}</button>`;
  });
  html += `<button class="filter-btn ${activeFilter==='none'?'active':''}" onclick="setFilter('none')">Sans catégorie</button>`;
  html += `<button class="filter-btn anki-filter ${activeFilter==='anki'?'active':''}" onclick="setFilter('anki')">À mettre sur Anki</button>`;
  row.innerHTML = html;
}
function setFilter(f) { activeFilter=f; renderFilters(); render(); }

// ═══════════════════════════════════════════════════════════════
//  WORD VALIDATION APIS
// ═══════════════════════════════════════════════════════════════

// Vérifie le mot via l'API Wordnik
// Doc : https://developer.wordnik.com/docs
async function checkWordnik(word) {
  if (!WORDNIK_API_KEY || WORDNIK_API_KEY.startsWith('VOTRE')) return null; // clé non configurée
  try {
    const res = await fetch(
      `https://api.wordnik.com/v4/word.json/${encodeURIComponent(word.toLowerCase())}/definitions?limit=1&api_key=${WORDNIK_API_KEY}`,
      { signal: AbortSignal.timeout(5000) }
    );
    if (res.status === 404) return false;
    if (!res.ok) return null;
    const data = await res.json();
    return Array.isArray(data) && data.length > 0;
  } catch { return null; }
}

// Lance la vérification et met à jour le bandeau
async function validateWord(word) {
  const strip = document.getElementById('validationStrip');
  if (!word) { strip.innerHTML = ''; return; }

  // Retour du cache si déjà validé
  if (validationCache[word] !== undefined) {
    renderValidationStrip(strip, word, validationCache[word]);
    return;
  }

  // Pas de connexion → message discret, n'empêche pas l'ajout
  if (!navigator.onLine) {
    strip.innerHTML = `<span class="val-badge pending">⚡ Vérification indisponible hors ligne</span>`;
    return;
  }

  // Spinner en attente
  strip.innerHTML = `<span class="val-badge pending"><span class="val-spinner"></span>Wordnik…</span>`;

  const result = await checkWordnik(word);
  validationCache[word] = result;
  renderValidationStrip(strip, word, result);
}

function renderValidationStrip(strip, word, result) {
  if (result === null) {
    strip.innerHTML = `<span class="val-badge pending">Wordnik : N/A</span>`;
  } else {
    const cls   = result ? 'valid' : 'invalid';
    const icon  = result ? '✓' : '✗';
    const label = result ? 'Mot valide' : 'Mot inconnu';
    strip.innerHTML = `<span class="val-badge ${cls}">${icon} Wordnik · ${label}</span>`;
  }

  // Mettre à jour la validité stockée si le mot existe déjà
  const key = word.toLowerCase().replace(/\s+/g,'_');
  if (state.words[key]) {
    state.words[key].validity = result === true ? 'valid' : result === false ? 'invalid' : 'unknown';
    save(); render();
  }
}

// Debounce : déclenche la validation 600ms après la dernière frappe
function onWordInputChange() {
  const word = document.getElementById('wordInput').value.trim();
  clearTimeout(validationTimer);
  document.getElementById('validationStrip').innerHTML = '';
  if (!word || word.length < 2) return;
  validationTimer = setTimeout(() => validateWord(word), 600);
}

// ═══════════════════════════════════════════════════════════════
//  WORDS
// ═══════════════════════════════════════════════════════════════

async function addWord() {
  const inp=document.getElementById('wordInput'), sel=document.getElementById('catSelect');
  const label=inp.value.trim(); if (!label) return;
  const key=label.toLowerCase().replace(/\s+/g,'_'), catKey=sel.value||null, now=ts();
  if (!state.words[key]) {
    state.words[key]={label, createdAt:now, catKey, occurrences:[now], ankiDone:false, validity:'unknown'};
  } else {
    state.words[key].occurrences.push(now);
    if (catKey) state.words[key].catKey=catKey;
  }
  inp.value='';
  document.getElementById('validationStrip').innerHTML='';
  save(); updateStats(); render();

  // Notification Anki
  if (isAnkiReady(state.words[key])) notify(label);

  // Lancer la validation en arrière-plan
  if (navigator.onLine) {
    await validateWord(label);
  }
}

function clickWord(key) {
  if (!state.words[key]) return;
  const w = state.words[key];
  const wasReady = isAnkiReady(w);
  w.occurrences.push(ts());
  if (!wasReady && isAnkiReady(w)) notify(w.label);
  save(); updateStats(); render();
}
function deleteWord(key) { delete state.words[key]; save(); updateStats(); render(); }
function markAnkiDone(key) {
  if (!state.words[key]) return;
  state.words[key].ankiDone=true;
  save(); updateStats(); render();
}

// ═══════════════════════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════════════════════

function updateStats() {
  const words=Object.values(state.words);
  document.getElementById('statWords').textContent=words.length;
  document.getElementById('statOcc').textContent=words.reduce((a,w)=>a+w.occurrences.length,0);
  document.getElementById('statCats').textContent=Object.keys(state.categories).length;
  document.getElementById('statAnki').textContent=words.filter(w=>isAnkiReady(w)).length;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════

function render() {
  const list=document.getElementById('wordList');
  const sort=document.getElementById('sortSelect').value;
  const search=(document.getElementById('searchInput').value||'').trim().toLowerCase();

  let keys=Object.keys(state.words).filter(key=>{
    const w=state.words[key];
    if (search && !w.label.toLowerCase().includes(search)) return false;
    if (activeFilter==='all') return true;
    if (activeFilter==='none') return !w.catKey;
    if (activeFilter==='anki') return isAnkiReady(w);
    return w.catKey===activeFilter;
  });

  keys.sort((a,b)=>{
    const wa=state.words[a], wb=state.words[b];
    if (sort==='freq') return wb.occurrences.length-wa.occurrences.length;
    if (sort==='alpha') return wa.label.localeCompare(wb.label);
    if (sort==='recent') return (wb.occurrences[wb.occurrences.length-1]||0)-(wa.occurrences[wa.occurrences.length-1]||0);
    if (sort==='oldest') return wa.createdAt-wb.createdAt;
    return 0;
  });

  if (!keys.length) {
    const msg = search ? `Aucun résultat pour "${search}"` : activeFilter==='anki' ? 'Aucun mot à mettre sur Anki pour l\'instant.' : 'Aucun mot encore.';
    list.innerHTML=`<div class="empty"><span class="empty-icon">✦</span>${msg}</div>`;
    return;
  }

  list.innerHTML=keys.map(key=>{
    const w=state.words[key];
    const anki=isAnkiReady(w), done=w.ankiDone;
    const col=w.catKey?getCatColor(w.catKey):null;
    const catLabel=w.catKey&&state.categories[w.catKey]?state.categories[w.catKey].label:null;
    const badge=catLabel&&col?`<span class="cat-badge" style="background:${col.bg};color:${col.color};border:0.5px solid ${col.border}">${catLabel}</span>`:'';
    const ankiBadge=anki?`<span class="anki-badge">Anki</span>`:'';
    const ankiBtn=anki?`<button class="anki-check-btn" onclick="markAnkiDone('${key}')" title="Marquer comme ajouté à Anki">✓ Ajouté</button>`:'';
    const dates=w.occurrences.map(t=>`<span class="date-tag" title="${fmtFull(t)}">${fmtShort(t)}</span>`).join('');

    // Badge de validité
    let validBadge = '';
    if (w.validity === 'valid')   validBadge = `<span class="word-valid-badge valid">✓ Valide</span>`;
    else if (w.validity === 'invalid') validBadge = `<span class="word-valid-badge invalid">✗ Inconnu</span>`;
    else if (w.validity === 'pending') validBadge = `<span class="word-valid-badge pending">…</span>`;

    return `<div class="word-card${anki?' anki-ready':''}${done?' anki-done':''}">
      <div class="word-card-top">
        <button class="word-btn" onclick="clickWord('${key}')">${w.label}</button>
        ${badge}${validBadge}${ankiBadge}
        <span class="count-badge">${w.occurrences.length}×</span>
        ${ankiBtn}
        <button class="btn btn-danger" onclick="deleteWord('${key}')">×</button>
      </div>
      <div class="word-dates">${dates}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
//  CHARTS
// ═══════════════════════════════════════════════════════════════

function renderCharts() { renderTimeline(); renderCatChart(); renderTopWords(); }

function renderTimeline() {
  const days=30, labels=[], data=[], now=new Date();
  for (let i=days-1;i>=0;i--) {
    const d=new Date(now); d.setDate(d.getDate()-i);
    const dayKey=fmtDay(d.getTime());
    labels.push(String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'));
    let count=0;
    Object.values(state.words).forEach(w=>w.occurrences.forEach(t=>{if(fmtDay(t)===dayKey)count++;}));
    data.push(count);
  }
  const ctx=document.getElementById('chartTimeline').getContext('2d');
  if (chartTimeline) chartTimeline.destroy();
  chartTimeline=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:'rgba(200,169,110,0.5)',borderColor:'#c8a96e',borderWidth:1,borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#555550',font:{size:10},maxTicksLimit:10},grid:{color:'rgba(255,255,255,0.04)'}},
               y:{ticks:{color:'#555550',font:{size:10},stepSize:1},grid:{color:'rgba(255,255,255,0.04)'}}}}
  });
}

function renderCatChart() {
  const catKeys=Object.keys(state.categories), labels=[], data=[], colors=[];
  catKeys.forEach(key=>{
    const col=getCatColor(key);
    labels.push(state.categories[key].label);
    data.push(Object.values(state.words).filter(w=>w.catKey===key).length);
    colors.push(col.color);
  });
  const uncat=Object.values(state.words).filter(w=>!w.catKey).length;
  if (uncat>0){labels.push('Sans catégorie');data.push(uncat);colors.push('#555550');}
  const ctx=document.getElementById('chartCats').getContext('2d');
  if (chartCats) chartCats.destroy();
  if (!data.length||data.every(d=>d===0)){
    ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
    ctx.fillStyle='#555550';ctx.font='13px DM Sans';ctx.textAlign='center';
    ctx.fillText('Aucune donnée',ctx.canvas.width/2,80);return;
  }
  chartCats=new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderColor:'#1a1a17',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#888880',font:{size:12},padding:14}}}}
  });
}

function renderTopWords() {
  const container=document.getElementById('topWords');
  const sorted=Object.values(state.words).sort((a,b)=>b.occurrences.length-a.occurrences.length).slice(0,10);
  if (!sorted.length){container.innerHTML='<span style="font-size:13px;color:var(--text-dim)">Aucun mot encore.</span>';return;}
  const max=sorted[0].occurrences.length;
  container.innerHTML=sorted.map(w=>`
    <div class="top-word-row">
      <span class="top-word-label${isAnkiReady(w)?' is-anki':''}">${w.label}</span>
      <div class="top-word-bar-wrap"><div class="top-word-bar${isAnkiReady(w)?' is-anki':''}" style="width:${Math.round(w.occurrences.length/max*100)}%"></div></div>
      <span class="top-word-count">${w.occurrences.length}</span>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════════════════════════════

function notify(word) {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    new Notification('Lexique — Mot prêt pour Anki', {
      body: `"${word}" a atteint ${ANKI_THRESHOLD} occurrences !`,
      icon: 'icon-192.png',
      badge: 'icon-192.png',
    });
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission().then(p => {
      if (p === 'granted') notify(word);
    });
  }
}

// Enregistrement du Service Worker

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('[SW] enregistré :', reg.scope))

  });

// Banière d'installation PWA
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
  deferredInstallPrompt = null;
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  if (outcome === 'accepted') document.getElementById('installBanner').classList.remove('show');
  deferredInstallPrompt = null;
});
function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
}

// Indicateur hors ligne
function updateOnlineStatus() {
  document.getElementById('offlineBadge').classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ═══════════════════════════════════════════════════════════════

document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  if(e.key==='f'||e.key==='F') document.getElementById('searchInput').focus();
});
document.getElementById('wordInput').addEventListener('keydown', e => { if(e.key==='Enter') addWord(); });
document.getElementById('catInput').addEventListener('keydown',  e => { if(e.key==='Enter') addCategory(); });

load();
renderCatManager(); renderCatSelect(); renderFilters(); updateStats(); render();
